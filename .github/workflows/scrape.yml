name: TikTok 7-Node Parallel Scraper to Mega

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 7 Nodes parallel chalenge
        node_index: [0, 1, 2, 3, 4, 5, 6]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx loguru

      - name: Run Scraper
        env:
          NODE_ID: ${{ matrix.node_index }}
          TOTAL_NODES: 7
        run: python scraper.py

      - name: Install Rclone
        run: sudo apt-get install rclone -y

      - name: Upload to Mega (vfx)
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF_DATA }}
        run: |
          # 1. Rclone config file create karna
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          
          # 2. Data copy karna Mega par [vfx remote use karte hue]
          # Har node ka data alag folder mein jayega
          rclone copy tiktok_data/ vfx:tiktok_backups/node-${{ matrix.node_index }}
