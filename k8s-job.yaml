apiVersion: batch/v1
kind: Job
metadata:
  name: tiktok-scraper-job
spec:
  parallelism: 3
  completions: 3
  template:
    spec:
      containers:
      - name: scraper
        image: ghcr.io/thhfspc-alpha/tiktok-scraper-k8s:latest
        volumeMounts:
        - name: storage
          mountPath: /app/tiktok_data
      restartPolicy: OnFailure
      volumes:
      - name: storage
        persistent_volume_claim:
          claim_name: tiktok-pvc
